name: Build and Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'src/frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          cd ./src/frontend/chessmate-frontend
          npm install
          npm run build
      
      - name: List directory structure (debug)
        run: |
          echo "Listing src/frontend/chessmate-frontend directory:"
          dir ./src/frontend/chessmate-frontend
          echo "Checking for common build directories:"
          if (Test-Path ./src/frontend/chessmate-frontend/build) { echo "build/ exists" } else { echo "build/ NOT FOUND" }
          if (Test-Path ./src/frontend/chessmate-frontend/dist) { echo "dist/ exists" } else { echo "dist/ NOT FOUND" }
          if (Test-Path ./src/frontend/chessmate-frontend/.next) { echo ".next/ exists" } else { echo ".next/ NOT FOUND" }
        shell: pwsh
      
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./src/frontend/chessmate-frontend/build  # Adjust based on debug output
          if-no-files-found: error  # This will fail the job if no files are found

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./frontend-app

      - name: 'Azure Login with OIDC'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'chessmate'
          slot-name: 'Production'
          package: ./frontend-app
